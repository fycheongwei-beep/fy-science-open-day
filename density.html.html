<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宽中科学组：五层密度实验</title>
    <style>
        :root {
            --bg-grad: radial-gradient(circle at center, #1a2a3a 0%, #050505 100%);
            --honey: #ff9100;
            --dishsoap: #00e676;
            --water: #00b0ff;
            --oil: #ffea00;
            --alcohol: #e91e63; /* 酒精设置为品红色/紫色 */
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-grad);
            color: white;
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; overflow: hidden;
        }

        /* 顶部标题 - 动态字号 */
        .header {
            height: 12vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; width: 100%;
        }
        h1 { 
            font-size: clamp(1.5rem, 4vh, 5vh); 
            margin: 0; color: #fff; 
            text-shadow: 0 0 15px rgba(52,152,219,0.5); 
        }
        .subtitle { font-size: clamp(0.8rem, 1.8vh, 2.2vh); color: #bdc3c7; }

        /* 状态提示 */
        #status-msg {
            height: 7vh;
            font-size: clamp(0.9rem, 2.2vh, 2.8vh);
            display: flex; align-items: center; justify-content: center;
            color: #3498db; font-weight: bold;
            background: rgba(255,255,255,0.05); width: 100%;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* 主实验区 */
        .main-stage {
            height: 64vh;
            width: 100vw;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 1vh;
        }

        /* 手机竖屏自适应布局 */
        @media (max-width: 768px) {
            .main-stage { flex-direction: column; height: 60vh; }
            .inventory { 
                flex-direction: row !important; 
                flex-wrap: wrap; 
                justify-content: center !important; 
                gap: 1vh !important;
                width: 100% !important;
            }
            .item { 
                width: 30% !important; 
                padding: 1vh !important; 
                font-size: 1.4vh !important;
                border-radius: 1vh !important;
            }
            .tube-wrapper { height: 60% !important; width: 40% !important; }
            .fact-card { font-size: 1.6vh !important; padding: 1vh !important; }
        }

        /* 试管 */
        .tube-wrapper {
            height: 100%;
            aspect-ratio: 1 / 2.5;
            display: flex; justify-content: center; align-items: flex-end;
        }

        .test-tube {
            width: 100%; height: 95%;
            border: 0.6vh solid #ecf0f1;
            border-top: none;
            border-bottom-left-radius: 10vh; border-bottom-right-radius: 10vh;
            position: relative; display: flex; flex-direction: column-reverse;
            overflow: hidden; background: rgba(255,255,255,0.1);
            box-shadow: 0 0 3vh rgba(0,0,0,0.5);
        }

        /* 液体选项区 */
        .inventory {
            display: flex; flex-direction: column;
            justify-content: center; gap: 1.5vh; width: 35%;
        }

        .item {
            padding: 2vh; border-radius: 1.5vh;
            cursor: pointer; font-size: 2.2vh;
            font-weight: bold; text-align: center;
            transition: all 0.2s; border: 2px solid rgba(255,255,255,0.1);
            box-shadow: 0 0.5vh 1vh rgba(0,0,0,0.3);
        }
        .item:active { transform: scale(0.9); filter: brightness(1.2); }
        .item.used { opacity: 0.1; pointer-events: none; }

        .honey { background: linear-gradient(135deg, #e65100, var(--honey)); }
        .dishsoap { background: linear-gradient(135deg, #1b5e20, var(--dishsoap)); }
        .water { background: linear-gradient(135deg, #01579b, var(--water)); }
        .oil { background: linear-gradient(135deg, #fbc02d, var(--oil)); color: #333; }
        .alcohol { background: linear-gradient(135deg, #ad1457, var(--alcohol)); }

        .layer {
            width: 100%; height: 0;
            transition: all 1s ease-out;
            display: flex; align-items: center; justify-content: center;
            font-size: 2vh; font-weight: bold; text-shadow: 1px 1px 2px #000;
        }

        /* 页脚区 (17vh) */
        .footer {
            height: 17vh; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 1vh;
        }

        .fact-card {
            background: rgba(255, 255, 255, 0.95); color: #2c3e50;
            padding: 1.5vh 3vw; border-radius: 1.5vh;
            font-size: 2vh; max-width: 90%;
            display: none; box-shadow: 0 0 2vh rgba(52, 152, 219, 0.3);
            line-height: 1.4; text-align: center;
        }

        button.reset-btn {
            padding: 1vh 5vw; font-size: 2vh;
            border-radius: 3vh; border: none;
            background: #e74c3c; color: white;
            cursor: pointer; font-weight: bold;
        }

        #overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-size: 3vh; cursor: pointer; text-align: center;
        }

        .shake { animation: shakeAnim 0.5s; }
        @keyframes shakeAnim {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(0.5deg); }
            75% { transform: rotate(-0.5deg); }
        }
    </style>
</head>
<body onclick="initAudio()">

    <div id="overlay">
        <div>🌈 密度彩虹瓶实验</div>
        <div style="font-size: 1.8vh; color: #3498db; margin-top: 2vh;">点击屏幕开始</div>
    </div>

    <div class="header">
        <h1>🧪 液体密度自动分层模拟</h1>
        <div class="subtitle">宽柔中学科学组 - 物理学实验</div>
    </div>

    <div id="status-msg">点击右侧液体，观察其在试管中的沉降</div>

    <div class="main-stage">
        <div class="tube-wrapper">
            <div class="test-tube" id="tube" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        </div>

        <div class="inventory">
            <div class="item honey" draggable="true" ondragstart="drag(event)" onclick="handleSelection('honey', 5, '蜜糖')" id="honey" data-w="5">🍯 蜜糖<br>(密度最大)</div>
            <div class="item dishsoap" draggable="true" ondragstart="drag(event)" onclick="handleSelection('dishsoap', 4, '洗碗精')" id="dishsoap" data-w="4">🧼 洗碗精<br>(密度大)</div>
            <div class="item water" draggable="true" ondragstart="drag(event)" onclick="handleSelection('water', 3, '水')" id="water" data-w="3">💧 水<br>(密度中)</div>
            <div class="item oil" draggable="true" ondragstart="drag(event)" onclick="handleSelection('oil', 2, '食用油')" id="oil" data-w="2">🌻 食用油<br>(密度小)</div>
            <div class="item alcohol" draggable="true" ondragstart="drag(event)" onclick="handleSelection('alcohol', 1, '酒精')" id="alcohol" data-w="1">🧪 酒精<br>(密度最小)</div>
        </div>
    </div>

    <div class="footer">
        <div class="fact-card" id="fact">
            <strong>💡 科学结论：</strong> 加入了酒精后，它浮在了食用油之上，因为酒精的密度（约0.79）比食用油还小。液体总是倾向于寻找与其密度相匹配的层级。
        </div>
        <button class="reset-btn" onclick="resetExperiment()">重置实验台</button>
    </div>

    <script>
        let tubeData = [];
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('overlay').style.display = 'none';
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'pour') {
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'win') {
                [523, 659, 783].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                    g.gain.setTargetAtTime(0, audioCtx.currentTime + i * 0.1, 0.1);
                    o.start(audioCtx.currentTime + i * 0.1); o.stop(audioCtx.currentTime + 0.4);
                });
            }
        }

        // 统一的处理逻辑，支持点击和拖拽
        function handleSelection(id, weight, name) {
            if (tubeData.find(l => l.id === id)) return;
            
            playSound('pour');
            tubeData.push({ id, weight, name });
            tubeData.sort((a, b) => b.weight - a.weight);

            document.getElementById(id).classList.add('used');
            document.getElementById('status-msg').innerText = `正在沉降 ${name}...`;
            renderTube();
        }

        // 拖拽相关函数 (PC端保留)
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
            ev.dataTransfer.setData("weight", ev.target.dataset.w);
            ev.dataTransfer.setData("name", ev.target.innerText.split('\n')[0].replace(/[^a-z0-9\u4e00-\u9fa5]/gi, ''));
        }
        function drop(ev) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("id");
            const weight = parseInt(ev.dataTransfer.getData("weight"));
            const name = ev.dataTransfer.getData("name");
            handleSelection(id, weight, name);
        }

        function renderTube() {
            const tube = document.getElementById("tube");
            tube.innerHTML = "";
            tube.classList.add('shake');
            
            // 五层液体，每层高度 20%
            const heightVal = 100 / 5;

            tubeData.forEach((liquid) => {
                const el = document.createElement("div");
                el.className = `layer ${liquid.id}`;
                el.innerHTML = liquid.name.substring(0,2); // 手机端简写
                tube.appendChild(el);
                setTimeout(() => { el.style.height = heightVal + "%"; }, 50);
            });

            setTimeout(() => {
                tube.classList.remove('shake');
                if (tubeData.length >= 2) document.getElementById('fact').style.display = "block";
                if (tubeData.length === 5) {
                    document.getElementById('status-msg').innerText = "🎉 完美！五层彩虹瓶挑战成功！";
                    document.getElementById('status-msg').style.color = "#2ecc71";
                    playSound('win');
                }
            }, 1000);
        }

        function resetExperiment() {
            tubeData = [];
            document.getElementById("tube").innerHTML = "";
            document.querySelectorAll('.item').forEach(i => i.classList.remove('used'));
            document.getElementById('status-msg').innerText = "点击左侧液体，观察其在试管中的沉降";
            document.getElementById('status-msg').style.color = "#3498db";
            document.getElementById('fact').style.display = "none";
        }
    </script>
</body>
</html>
