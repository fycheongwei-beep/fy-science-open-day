<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宽中科学组：深海潜艇极限界</title>
    <style>
        :root {
            --sub-color: #ffeb3b;
            --mine-color: #37474f;
            --gold: #ffd700;
            /* 适配手机浏览器的动态高度 */
            --full-height: 100dvh; 
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden; /* 严禁滚动 */
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: var(--full-height);
            width: 100vw;
        }

        /* 顶部得分栏 - 更加紧凑 */
        #hud {
            flex: 0 0 12%; /* 占用12%高度 */
            background: #001219;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            border-bottom: 3px solid #00afb9;
            z-index: 20;
        }
        .score-box { display: flex; align-items: center; gap: 8px; }
        .score-label { font-size: 0.9rem; color: #00afb9; }
        #score, #high-score { font-size: 1.8rem; }
        #high-score { color: var(--gold); }

        /* 核心游戏区 - 自动拉伸 */
        #game-view {
            flex: 1; /* 占用所有剩余空间 */
            position: relative;
            background: linear-gradient(to bottom, #0077b6, #001219, #000);
            overflow: hidden;
            width: 100%;
        }

        /* 底部巨大提示栏 */
        #controls-hint {
            flex: 0 0 15%; /* 占用15%高度 */
            background: #ae2012;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-top: 3px solid white;
            text-align: center;
            animation: danger-pulse 1.5s infinite;
        }

        /* 横屏模式下的特别优化 */
        @media (orientation: landscape) {
            #score, #high-score { font-size: 1.4rem; }
            #controls-hint { font-size: 1.2rem; flex: 0 0 12%; }
            #hud { flex: 0 0 10%; }
        }

        /* 潜水艇 - 尺寸随屏幕缩放 */
        #submarine {
            position: absolute;
            left: 10%;
            top: 50%;
            width: 120px; /* 略微缩小 */
            height: 60px;
            background: var(--sub-color);
            border-radius: 30px 80px 80px 30px;
            z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s linear;
        }
        #submarine::after {
            content: ''; position: absolute; top: -20px; left: 35px;
            width: 30px; height: 25px; background: var(--sub-color); border-radius: 8px 8px 0 0;
        }
        .propeller {
            position: absolute; left: -12px; top: 18px;
            width: 12px; height: 25px; background: #222;
            animation: spin 0.1s linear infinite;
        }
        @keyframes spin { from { transform: rotateX(0); } to { transform: rotateX(360deg); } }

        /* 压载舱 */
        #ballast-tank {
            position: absolute; bottom: 8px; left: 15px;
            width: 70px; height: 28px; background: rgba(255,255,255,0.9);
            border: 2px solid #333; border-radius: 5px; overflow: hidden;
        }
        #water-level {
            position: absolute; bottom: 0; width: 100%; height: 20%;
            background: #0077b6; transition: height 0.3s ease;
        }

        /* 水雷 */
        .mine { position: absolute; width: 50px; height: 50px; z-index: 5; }
        .mine-body {
            width: 100%; height: 100%; background: var(--mine-color);
            border-radius: 50%; position: relative; box-shadow: inset -3px -3px 10px #000;
        }
        .spike { position: absolute; width: 6px; height: 15px; background: var(--mine-color); left: 22px; top: -8px; }
        .light {
            position: absolute; top: 18px; left: 18px; width: 14px; height: 14px;
            background: red; border-radius: 50%; animation: blink 0.4s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; box-shadow: 0 0 15px red; } 50% { opacity: 0.1; } }
        @keyframes danger-pulse { 0%, 100% { background: #ae2012; } 50% { background: #660708; } }

        /* 弹窗适配 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 20px;
        }
        button {
            padding: 15px 40px; font-size: 1.8rem; background: #00afb9;
            color: white; border: none; border-radius: 12px; cursor: pointer;
        }
        .title { font-size: 2.5rem; color: var(--gold); text-align: center; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div id="hud">
        <div class="score-box">
            <span class="score-label">SCORE</span>
            <span id="score">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">🏆 BEST</span>
            <span id="high-score">0</span>
        </div>
    </div>

    <div id="game-view">
        <div id="submarine">
            <div class="propeller"></div>
            <div id="ballast-tank">
                <div id="water-level"></div>
            </div>
        </div>
    </div>

    <div id="controls-hint">
        👇长按下沉 | 👆松开上升
    </div>

    <div id="start-screen" class="modal">
        <div class="title">深海潜艇生存战</div>
        <button onclick="startGame()">启动引擎</button>
        <p style="margin-top: 15px; color: #94d2bd;">[ 科学原理：浮力与压缩 ]</p>
    </div>

    <div id="game-over" class="modal" style="display: none;">
        <h1 style="color: #ff1744; font-size: 3rem;">💥 损毁!</h1>
        <div id="final-score" style="font-size: 2rem; margin-bottom: 20px;">得分: 0</div>
        <button onclick="location.reload()">重新部署</button>
    </div>

    <script>
        const sub = document.getElementById('submarine');
        const waterLevel = document.getElementById('water-level');
        const gameView = document.getElementById('game-view');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('high-score');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');

        let viewH = 0;
        let subY = 100;
        let velocity = 0;
        let isPressing = false;
        let score = 0;
        let mines = [];
        let gameActive = false;
        let spawnTimer = 0;
        
        let historyScore = localStorage.getItem('sub_high_score') || 0;
        highScoreDisplay.innerText = historyScore;

        let audioCtx;
        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        function playPing() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(600 + (score/5), audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        function startGame() {
            initAudio();
            startScreen.style.display = 'none';
            gameActive = true;
            viewH = gameView.offsetHeight;
            subY = viewH / 2;
            loop();
            const sonar = () => {
                if(gameActive) {
                    playPing();
                    setTimeout(sonar, Math.max(500, 2000 - (score * 2)));
                }
            };
            sonar();
        }

        // 统一处理触摸和鼠标
        const pressAction = (e) => {
            if(!gameActive) return;
            e.preventDefault();
            isPressing = true;
            waterLevel.style.height = "90%";
        };
        const releaseAction = () => {
            isPressing = false;
            waterLevel.style.height = "20%";
        };

        window.addEventListener('mousedown', pressAction);
        window.addEventListener('touchstart', pressAction, {passive: false});
        window.addEventListener('mouseup', releaseAction);
        window.addEventListener('touchend', releaseAction);

        function createMine() {
            const m = document.createElement('div');
            m.className = 'mine';
            m.innerHTML = `<div class="mine-body">
                ${[0,90,180,270].map(deg => `<div class="spike" style="transform:rotate(${deg}deg) translateY(-6px)"></div>`).join('')}
                <div class="light"></div>
            </div>`;
            let y = Math.random() * (gameView.offsetHeight - 55);
            m.style.top = y + 'px';
            m.style.left = window.innerWidth + 'px';
            gameView.appendChild(m);
            mines.push({ el: m, x: window.innerWidth });
        }

        function loop() {
            if (!gameActive) return;

            viewH = gameView.offsetHeight;
            let buoyancy = isPressing ? 0.7 : -0.5;
            velocity += buoyancy;
            velocity *= 0.94;
            subY += velocity;

            if (subY < 0) { subY = 0; velocity = 0; }
            if (subY > viewH - 60) { subY = viewH - 60; velocity = 0; }
            sub.style.top = subY + 'px';
            sub.style.transform = `rotate(${velocity * 2}deg)`;

            let currentSpeed = 5 + (score / 50); 
            let currentSpawnRate = Math.max(25, 70 - (score / 20));

            spawnTimer++;
            if (spawnTimer > currentSpawnRate) {
                createMine();
                if(score > 400 && Math.random() > 0.8) setTimeout(createMine, 300);
                spawnTimer = 0;
            }

            for (let i = mines.length - 1; i >= 0; i--) {
                let m = mines[i];
                m.x -= currentSpeed;
                m.el.style.left = m.x + 'px';

                let sR = sub.getBoundingClientRect();
                let mR = m.el.getBoundingClientRect();
                
                if (sR.left < mR.right - 15 && sR.right > mR.left + 15 &&
                    sR.top < mR.bottom - 15 && sR.bottom > mR.top + 15) {
                    gameActive = false;
                    gameOver();
                }

                if (m.x < -80) {
                    gameView.removeChild(m.el);
                    mines.splice(i, 1);
                    score += 10;
                    scoreDisplay.innerText = score;
                }
            }
            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameOverScreen.style.display = 'flex';
            document.getElementById('final-score').innerText = `最终得分: ${score}`;
            if (score > historyScore) {
                localStorage.setItem('sub_high_score', score);
            }
        }

        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
